# =====================
# 设备健康检查配置
# =====================
# 是否启用健康检查
device.health.enabled=true
# 心跳检测间隔(毫秒)，默认60秒
device.health.check-interval=60000
# 离线判定阈值(秒)，默认180秒(3分钟)
device.health.offline-threshold=180

